<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Расписание ОмГТУ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo img {
            height: 64px;
            width: 64px;
            object-fit: contain;
            margin-bottom: 1rem;
        }
        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .role-option {
            padding: 1.25rem 1rem;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-input);
        }
        .role-option:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .role-option.selected {
            border-color: var(--accent);
            background: var(--accent-light);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }
        .role-option i {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .role-option.selected i {
            color: var(--accent);
        }
        .role-option span {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        .teacher-input {
            display: none;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.3s ease;
        }
        .teacher-input.show {
            display: block;
        }
        .error-message {
            display: none;
            background: rgba(255, 59, 48, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .error-message.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body style="padding-top: 0;">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Логотип">
                <h1>Расписание ОмГТУ</h1>
                <p>Выберите роль для продолжения</p>
            </div>

            <div class="role-selector">
                <div class="role-option" data-role="student" onclick="selectRole('student')">
                    <i class="bi bi-mortarboard-fill"></i>
                    <span>Студент</span>
                </div>
                <div class="role-option" data-role="teacher" onclick="selectRole('teacher')">
                    <i class="bi bi-person-workspace"></i>
                    <span>Преподаватель</span>
                </div>
            </div>

            <div class="teacher-input" id="teacherInput">
                <label class="form-label">Ваше ФИО</label>
                <input type="text" class="form-control" id="teacherName" placeholder="Введите фамилию...">
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button class="btn btn-primary w-100" id="loginBtn" onclick="doLogin()" disabled>
                Войти
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedRole = null;

        function selectRole(role) {
            selectedRole = role;
            
            // Обновляем визуальное состояние
            document.querySelectorAll('.role-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.role === role);
            });
            
            // Показываем поле для преподавателя
            const teacherInput = document.getElementById('teacherInput');
            teacherInput.classList.toggle('show', role === 'teacher');
            
            // Активируем кнопку
            const btn = document.getElementById('loginBtn');
            if (role === 'student') {
                btn.disabled = false;
            } else {
                btn.disabled = !document.getElementById('teacherName').value.trim();
            }
            
            // Скрываем ошибку
            document.getElementById('errorMessage').classList.remove('show');
        }

        document.getElementById('teacherName').addEventListener('input', function() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = !this.value.trim();
        });

        document.getElementById('teacherName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            if (!selectedRole) return;
            
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Вход...';
            btn.disabled = true;
            errorDiv.classList.remove('show');
            
            const body = { role: selectedRole };
            if (selectedRole === 'teacher') {
                body.teacher_name = document.getElementById('teacherName').value.trim();
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                if (data.status === 'ok') {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.error || 'Ошибка входа';
                    errorDiv.classList.add('show');
                    btn.innerHTML = 'Войти';
                    btn.disabled = false;
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения с сервером';
                errorDiv.classList.add('show');
                btn.innerHTML = 'Войти';
                btn.disabled = false;
            }
        }

        // Проверяем, не авторизован ли уже
        (async () => {
            try {
                const resp = await fetch('/api/session');
                const session = await resp.json();
                if (session.logged_in) {
                    window.location.href = '/';
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
